<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Music Learner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1100px; }
        .setup-box, .game-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex: 1; min-width: 350px; }
        #player { width: 100%; border-radius: 8px; aspect-ratio: 16/9; background: #000; }
        .word-tile { display: inline-block; padding: 10px; margin: 5px; background: #3498db; color: white; cursor: pointer; border-radius: 5px; }
        #drop-zone { border: 2px dashed #3498db; padding: 15px; min-height: 40px; margin: 10px 0; border-radius: 5px; background: #f9f9f9; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .time-inputs { display: flex; gap: 10px; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .wrong { background: #e74c3c !important; }
    </style>
</head>
<body>

    <h2 style="color: #2c3e50;">🎵 Sync & Learn</h2>
    <div style="margin-bottom: 20px; font-weight: bold;">Score: <span id="score">1000</span></div>

    <div class="main-container">
        <div class="setup-box">
            <h3>1. Prepare Segment</h3>
            <input type="text" id="ytUrl" placeholder="YouTube URL">
            <input type="text" id="lyricsInput" placeholder="Enter lyrics for this segment">
            <div class="time-inputs">
                <input type="number" id="startTime" placeholder="Start (seconds)" value="0">
                <input type="number" id="endTime" placeholder="End (seconds)" value="10">
            </div>
            <button onclick="setupGame()">Start Sync'd Activity</button>
        </div>

        <div class="game-section">
            <div id="player"></div>
            <div id="drop-zone"></div>
            <div id="word-pool"></div>
        </div>
    </div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player, correctOrder = [], currentInput = [], score = 1000;
    let syncTimer;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '360', width: '100%', videoId: 'dQw4w9WgXcQ' });
    }

    function setupGame() {
        const url = document.getElementById('ytUrl').value;
        const start = parseFloat(document.getElementById('startTime').value);
        const end = parseFloat(document.getElementById('endTime').value);
        const vidId = url.split('v=')[1]?.split('&')[0] || url.split('youtu.be/')[1];

        if(vidId) player.loadVideoById({ videoId: vidId, startSeconds: start });

        // Activity Logic
        const text = document.getElementById('lyricsInput').value;
        correctOrder = text.split(" ").filter(Boolean);
        let shuffled = [...correctOrder].sort(() => Math.random() - 0.5);
        
        document.getElementById('word-pool').innerHTML = "";
        shuffled.forEach(word => {
            let span = document.createElement('span');
            span.innerText = word;
            span.className = "word-tile";
            span.onclick = () => {
                if (word === correctOrder[currentInput.length]) {
                    currentInput.push(word);
                    document.getElementById('drop-zone').innerText = currentInput.join(" ");
                    span.style.display = "none";
                } else {
                    score -= 50;
                    document.getElementById('score').innerText = score;
                    span.classList.add('wrong');
                    setTimeout(() => span.classList.remove('wrong'), 500);
                }
            };
            document.getElementById('word-pool').appendChild(span);
        });

        document.getElementById('drop-zone').innerText = "";
        currentInput = [];

        // START THE SYNC CHECKER
        clearInterval(syncTimer);
        syncTimer = setInterval(() => {
            if (player.getCurrentTime() >= end) {
                player.seekTo(start); // Loop back to the start of the sentence
            }
        }, 500);
    }
</script>
</body>
</html>
